<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aswin Arangil | Secure Access</title>
    <link rel="stylesheet" href="./res/style_login.css">
</head>
<body>
    <div class="login-container">
        <img src="./res/aswn.jpg" class="user-profile" alt="Aswin Arangil">

        <h2>Workstation Login</h2>

        <form id="login-form">
            <div style="margin-bottom:15px; position: relative;">
                <input type="password" id="password" placeholder="Enter Access Key" required>
                <button type="button" id="togglePassword" 
                        style="position: absolute; right: 10px; top: 12px; background: none; border: none; color: #00e5ff; cursor: pointer; width: auto; padding: 0; font-size: 11px; font-weight: bold; letter-spacing: 1px;">
                    SHOW
                </button>
            </div>

            <button type="submit" id="submit-btn">
                <span id="btn-text">Unlock Portfolio</span>
                <div class="spinner" id="loader"></div>
            </button>
        </form>

        <div id="error-message">Access Denied: Invalid Key</div>
    </div>

    <script>
        // SHA-256 hash function
        async function hashPassword(password) {
            const msgUint8 = new TextEncoder().encode(password);
            const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
            const hashArray = Array.from(new Uint8Array(hashBuffer));
            const hashHex = hashArray.map(b => b.toString(16).padStart(2, '0')).join('');
            return hashHex;
        }

        document.addEventListener("DOMContentLoaded", function() {
            const form = document.getElementById("login-form");
            const passwordInput = document.getElementById("password");
            const togglePassword = document.getElementById("togglePassword");
            const errorDiv = document.getElementById("error-message");
            const submitBtn = document.getElementById("submit-btn");
            const btnText = document.getElementById("btn-text");
            const loader = document.getElementById("loader");

            const correctPasswordHash = "eb9c28e32aec35dfb0233e540dc27587df61603ae7efa6f28753cb1dd1f4f43c";

            // Show/Hide Toggle Logic
            togglePassword.addEventListener("click", function() {
                if (passwordInput.type === "password") {
                    passwordInput.type = "text";
                    togglePassword.textContent = "HIDE";
                } else {
                    passwordInput.type = "password";
                    togglePassword.textContent = "SHOW";
                }
            });

            // Login Logic
            form.addEventListener("submit", async function(e) {
                e.preventDefault();
                
                // Start Loading State
                submitBtn.classList.add("loading");
                btnText.style.display = "none";
                loader.style.display = "block";
                errorDiv.style.display = "none";

                const enteredPassword = passwordInput.value;
                const enteredHash = await hashPassword(enteredPassword);

                // Artificial delay to feel like a "secure check"
                setTimeout(function() {
                    if (enteredHash === correctPasswordHash) {
                        window.location.href = "protected/index.html"; 
                    } else {
                        // Reset if wrong
                        submitBtn.classList.remove("loading");
                        btnText.style.display = "block";
                        loader.style.display = "none";
                        errorDiv.style.display = "block";
                        
                        // Shake the button for feedback
                        submitBtn.style.animation = "none";
                        setTimeout(() => { submitBtn.style.animation = "shake 0.4s"; }, 10);
                    }
                }, 1200); 
            });

            passwordInput.addEventListener("input", () => {
                errorDiv.style.display = "none";
            });
        });
    </script>
</body>
</html>
